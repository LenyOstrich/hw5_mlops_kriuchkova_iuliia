stages:
  prepare:
    cmd: python src/prepare.py
    deps:
    - data/raw/iris.csv
    - src/prepare.py
    outs:
    - data/processed/iris_clean.csv
  train:
    cmd: python src/train.py
    deps:
    - data/processed/iris_clean.csv
    - src/train.py
    params:
    - model.max_iter
    outs:
    - model.pkl
